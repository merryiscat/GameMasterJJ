{% extends "base.html" %}
{% set active_menu = "games" %}
{% block title %}{{ "게임 수정" if mode == "edit" else "게임 추가" }} - GMJJ 어드민{% endblock %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
    <a href="/admin/games" class="text-gray-500 hover:text-gray-700">&larr; 목록</a>
    <h2 class="text-2xl font-bold text-gray-800">
        {{ "게임 수정" if mode == "edit" else "게임 추가" }}
    </h2>
</div>

<form method="POST"
      action="{{ '/admin/games/' ~ game.id if mode == 'edit' else '/admin/games' }}"
      class="bg-white rounded-lg shadow p-6 max-w-4xl">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- 한글명 (필수) -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">한글명 *</label>
            <input type="text" name="name_ko" required
                   value="{{ game.name_ko if game else '' }}"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 영문명 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">영문명</label>
            <input type="text" name="name_en"
                   value="{{ game.name_en if game and game.name_en else '' }}"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 출시 연도 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">출시 연도</label>
            <input type="number" name="year_published"
                   value="{{ game.year_published if game and game.year_published else '' }}"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 최소 인원 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">최소 인원</label>
            <input type="number" name="min_players" min="1"
                   value="{{ game.min_players if game and game.min_players else '' }}"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 최대 인원 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">최대 인원</label>
            <input type="number" name="max_players" min="1"
                   value="{{ game.max_players if game and game.max_players else '' }}"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 플레이 시간 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">플레이 시간 (분)</label>
            <input type="number" name="playtime" min="0"
                   value="{{ game.playtime if game and game.playtime else '' }}"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 평점 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">평점 (0~10)</label>
            <input type="number" name="rating" step="0.1" min="0" max="10"
                   value="{{ game.rating if game and game.rating else '' }}"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 난이도 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">난이도 (0~5)</label>
            <input type="number" name="difficulty" step="0.1" min="0" max="5"
                   value="{{ game.difficulty if game and game.difficulty else '' }}"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 언어 의존도 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">언어 의존도</label>
            <select name="language_dependency"
                    class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                <option value="">선택 안함</option>
                {% set ld = game.language_dependency if game else "" %}
                <option value="없음" {{ "selected" if ld == "없음" }}>없음</option>
                <option value="낮음" {{ "selected" if ld == "낮음" }}>낮음</option>
                <option value="보통" {{ "selected" if ld == "보통" }}>보통</option>
                <option value="높음" {{ "selected" if ld == "높음" }}>높음</option>
                <option value="매우 높음" {{ "selected" if ld == "매우 높음" }}>매우 높음</option>
            </select>
        </div>
    </div>

    <!-- 배열 필드들 (쉼표 구분) -->
    <div class="mt-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                메커니즘 <span class="text-gray-400 font-normal">(쉼표로 구분)</span>
            </label>
            <input type="text" name="mechanisms"
                   value="{{ game.mechanisms | join(', ') if game and game.mechanisms else '' }}"
                   placeholder="워커 플레이스먼트, 핸드 관리, 세트 컬렉션"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                카테고리 <span class="text-gray-400 font-normal">(쉼표로 구분)</span>
            </label>
            <input type="text" name="categories"
                   value="{{ game.categories | join(', ') if game and game.categories else '' }}"
                   placeholder="전략, 경제, 문명"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                디자이너 <span class="text-gray-400 font-normal">(쉼표로 구분)</span>
            </label>
            <input type="text" name="designers"
                   value="{{ game.designers | join(', ') if game and game.designers else '' }}"
                   placeholder="Uwe Rosenberg"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                퍼블리셔 <span class="text-gray-400 font-normal">(쉼표로 구분)</span>
            </label>
            <input type="text" name="publishers"
                   value="{{ game.publishers | join(', ') if game and game.publishers else '' }}"
                   placeholder="Lookout Games, 코리아보드게임즈"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 한줄 소개 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">한줄 소개</label>
            <input type="text" name="one_liner"
                   value="{{ game.one_liner if game and game.one_liner else '' }}"
                   placeholder="농장을 경영하며 가족을 키우는 전략 게임"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- 설명 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">설명 (한국어)</label>
            <textarea name="description_ko" rows="5"
                      class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                      >{{ game.description_ko if game and game.description_ko else '' }}</textarea>
        </div>
    </div>

    <!-- 저장 버튼 -->
    <div class="mt-6 flex gap-4">
        <button type="submit"
                class="bg-blue-600 text-white px-8 py-2 rounded hover:bg-blue-700 transition">
            {{ "수정 저장" if mode == "edit" else "추가" }}
        </button>
        <a href="/admin/games"
           class="px-8 py-2 border rounded text-gray-600 hover:bg-gray-100 transition">
            취소
        </a>
    </div>
</form>
{% endblock %}

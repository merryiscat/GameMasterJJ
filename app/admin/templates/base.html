<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GMJJ 어드민{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex min-h-screen">

        <!-- ========== 좌측 사이드바 ========== -->
        <aside class="w-56 bg-gray-900 text-gray-300 flex-shrink-0">
            <!-- 로고 -->
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-xl font-bold text-white">GMJJ 어드민</h1>
                <p class="text-xs text-gray-500 mt-1">크롤링 관리 시스템</p>
            </div>

            <!-- 메뉴 -->
            <nav class="mt-4">
                <a href="/admin/"
                   class="flex items-center px-4 py-3 hover:bg-gray-800 hover:text-white transition
                          {% if active_menu == 'dashboard' %}bg-gray-800 text-white{% endif %}">
                    <span class="mr-3">&#9632;</span> 대시보드
                </a>
                <a href="/admin/sources"
                   class="flex items-center px-4 py-3 hover:bg-gray-800 hover:text-white transition
                          {% if active_menu == 'sources' %}bg-gray-800 text-white{% endif %}">
                    <span class="mr-3">&#9632;</span> 소스 관리
                </a>
                <a href="/admin/jobs"
                   class="flex items-center px-4 py-3 hover:bg-gray-800 hover:text-white transition
                          {% if active_menu == 'jobs' %}bg-gray-800 text-white{% endif %}">
                    <span class="mr-3">&#9632;</span> 배치 관리
                </a>
                <a href="/admin/games"
                   class="flex items-center px-4 py-3 hover:bg-gray-800 hover:text-white transition
                          {% if active_menu == 'games' %}bg-gray-800 text-white{% endif %}">
                    <span class="mr-3">&#9632;</span> 게임 관리
                </a>
            </nav>
        </aside>

        <!-- ========== 메인 콘텐츠 ========== -->
        <main class="flex-1 p-6">
            {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <strong>오류:</strong> {{ error }}
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>

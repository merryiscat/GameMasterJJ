<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}GMJJ{% endblock %}</title>

    <!-- 폰트: Jua(제목) + Pretendard(본문) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        /* ── 리셋 & 기본 ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0B1120;
            color: #D1D5DB;
            -webkit-font-smoothing: antialiased;
        }

        /* ── 색상 변수 ── */
        :root {
            --emerald-deep: #065F46;
            --emerald-mid: #047857;
            --teal: #0D9488;
            --teal-light: #2DD4BF;
            --cyan: #0E7490;
            --cyan-light: #67E8F9;
            --rose: #E11D48;
            --rose-light: #FB7185;
            --bg-primary: #0B1120;
            --bg-secondary: #111B2E;
            --bg-card: #152238;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border: rgba(255,255,255,0.06);
        }

        /* ── 모바일 프레임 (최대 430px) ── */
        .app-frame {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ── 메인 콘텐츠 영역 ── */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 72px; /* 하단 네비 높이 */
        }

        /* ── 하단 네비게이션 ── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            height: 64px;
            background: #080D18;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 16px;
            transition: color 0.2s;
        }
        .nav-item svg {
            width: 22px;
            height: 22px;
            fill: var(--text-muted);
            transition: fill 0.2s;
        }
        .nav-item.active {
            color: var(--rose);
        }
        .nav-item.active svg {
            fill: var(--rose);
        }

        /* ── 제목 폰트 ── */
        .font-title {
            font-family: 'Jua', sans-serif;
        }

        /* ── 공통 유틸 ── */
        .text-teal { color: var(--teal-light); }
        .text-cyan { color: var(--cyan-light); }
        .text-rose { color: var(--rose-light); }
        .text-muted { color: var(--text-muted); }
        .bg-card { background: var(--bg-card); }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>

<div class="app-frame">
    <main class="app-content">
        {% block content %}{% endblock %}
    </main>

    <!-- ── 하단 네비게이션 ── -->
    <nav class="bottom-nav">
        {% if nav_mode == 'mygame' %}
        <!-- Mygame 내부: Mygame | Gamelist | 설정 -->
        <a href="/mygame" class="nav-item {% if active_nav == 'mygame' %}active{% endif %}">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            Mygame
        </a>
        <a href="/games" class="nav-item {% if active_nav == 'gamelist' %}active{% endif %}">
            <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
            Gamelist
        </a>
        {% elif nav_mode == 'game' %}
        <!-- 보드게임 내부: Mygame | 홈 | 설정 -->
        <a href="/mygame" class="nav-item {% if active_nav == 'mygame' %}active{% endif %}">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            Mygame
        </a>
        <a href="/" class="nav-item {% if active_nav == 'home' %}active{% endif %}">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            홈
        </a>
        {% else %}
        <!-- 메인: 커뮤니티 | 홈 | 설정 -->
        <a href="#" class="nav-item {% if active_nav == 'community' %}active{% endif %}">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            커뮤니티
        </a>
        <a href="/" class="nav-item {% if active_nav == 'home' %}active{% endif %}">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            홈
        </a>
        {% endif %}
        <a href="#" class="nav-item {% if active_nav == 'settings' %}active{% endif %}">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            설정
        </a>
    </nav>
</div>

{% block extra_script %}{% endblock %}
</body>
</html>

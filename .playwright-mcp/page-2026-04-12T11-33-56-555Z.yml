          - paragraph [ref=e27]: "## 게임: 뱅! ### 섹션: Setup 1. **총알 토큰 준비**: 첫 게임 전에 총알 토큰을 프레임에서 조심스럽게 제거하세요. 2. **플레이어 보드**: 각 플레이어는 역할, 캐릭터, 무기 및 총알을 보관하기 위해 플레이 보드를 가져갑니다. 3. **역할 카드 배분**: - 카드를 섞고 각 플레이어에게 한 장씩, 뒷면이 보이도록 나눠줍니다. - 보안관은 자신의 카드를 앞면으로 뒤집어 자신을 공개합니다. - 다른 모든 플레이어는 자신의 역할을 확인하지만 비밀로 유지합니다. 4. **캐릭터 카드 배분**: - 캐릭터 카드를 섞고 각 플레이어에게 한 장씩, 앞면이 보이도록 나눠줍니다. - 각 플레이어는 자신의 캐릭터 이름을 발표하고 능력을 읽습니다. 5. **총알 준비**: - 각 플레이어는 자신의 캐릭터에 표시된 만큼의 총알을 가져갑니다. - 보안관은 추가로 한 개의 총알을 받습니다. 6. **플레이 카드 배분**: - 플레이 카드를 섞고 각 플레이어에게 그가 가진 총알 수만큼의 카드를 뒷면이 보이도록 나눠줍니다. - 남은 플레이 카드는 테이블 중앙에 뒷면이 보이도록 놓아 드로우 더미를 만듭니다. - 버리는 더미를 위한 공간을 남겨두세요."

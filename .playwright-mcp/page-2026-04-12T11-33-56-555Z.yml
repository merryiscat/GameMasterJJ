          - paragraph [ref=e37]: "## 게임 종료 조건 게임은 다음 조건 중 하나가 충족되면 종료됩니다: 1. **보안관이 죽을 경우** - 레니게이드가 유일하게 살아남았다면, 레니게이드가 승리합니다. - 그렇지 않으면 아웃로우가 승리합니다. 2. **모든 아웃로우와 레니게이드가 죽을 경우** - 보안관과 그의 보조들이 승리합니다. ## 승리 조건 각 플레이어는 자신의 목표가 있습니다: - **보안관**: 법과 질서를 보호하기 위해 모든 무법자와 배신자를 제거해야 합니다. - **무법자**: 보안관을 죽이고 싶어하지만, 보상을 얻기 위해 서로를 제거하는 것에는 거리낌이 없습니다. - **보조 보안관**: 보안관을 돕고 보호하며, 어떤 대가를 치르더라도 같은 목표를 공유합니다. - **배신자**: 새로운 보안관이 되고 싶어하며, 그의 목표는 마지막까지 살아남는 것입니다."

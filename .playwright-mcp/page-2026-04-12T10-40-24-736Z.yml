      - generic [ref=e25]:
        - heading "게임 설명" [level=3] [ref=e26]
        - paragraph [ref=e27]: 텔레스트레이션은그림과 상상력으로 웃음을 만드는 파티 게임입니다. 이 게임은 마치 그림으로 하는텔레폰 게임(전달 놀이)처럼, 단어가 사람을 거치면서 점점 엉뚱하게 변해가는 과정을 즐기는 데에 중점을 둡니다.게임은 매우 단순하게 시작됩니다. 각 플레이어는스케치북과마커펜을 받고, 무작위로 주어진 단어를 첫 페이지에 씁니다. 다음 장에서는 그 단어를 그림으로 표현합니다. 이후 그 그림은 옆 사람에게 전달되고, 옆 사람은 그림을 보고 무슨 단어인지 추측해서 글로 씁니다. 다음 사람은 그 단어를 보고 또 그림을 그리고… 이 과정을 반복합니다.이렇게 스케치북이 한 바퀴 돌아 처음 사람에게 돌아오면, 모두가 각 페이지를 넘기며단어가 어떻게 변형되었는지 확인하게 됩니다. ‘지하철역’이 ‘핫도그’로, ‘의자’가 ‘로켓발사’로 바뀌는 과정은 언제나 예측 불가능하고 폭소를 유발합니다.텔레스트레이션의 특징은그림 실력이 전혀 중요하지 않다는 점입니다. 오히려 서툰 그림, 엉뚱한 해석이 게임의 재미를 배가시킵니다. 잘 그리려 애쓰는 것보다, 최대한 직관적이고 단순하게 표현하려는 노력이 더 중요하게 작용하죠.이 게임은 경쟁보다는웃음과 소통에 중점을 둡니다. 점수를 매길 수도 있지만, 대부분은 단지 결과를 함께 보고 즐기는 것으로 충분합니다. 게임이 끝난 뒤에도 사람들은 "그때 그 그림 기억나?"라며 한참을 이야기하게 됩니다.인원이 많을수록 더 재미있고,남녀노소 누구나 즐길 수 있으며,언어 장벽도 낮기 때문에모임이나 파티에서 최고의 분위기 메이커로 활약합니다. 특히 가족 모임, 워크숍, MT, 송년회처럼 모두가 함께 웃고 싶은 자리에서 큰 인기를 끌고 있습니다.텔레스트레이션은 규칙은 쉽지만, 결과는 결코 예상할 수 없습니다. 오해와 왜곡, 상상력과 창의성이 뒤엉켜 만들어내는그림의 연쇄작용은, 한 판의 게임을 하나의 작은 이야기처럼 만들어 줍니다. 그리고 그 이야기에는 항상웃음이 함께 따라옵니다.
